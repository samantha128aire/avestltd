<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f2937">
    <title>AvestAI Chat</title>
    <link rel="icon" href="https://avestltd.com/assets/images/logo-transparent-512.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <img src="https://avestltd.com/assets/images/logo-transparent-512.png" alt="AvestAI" class="logo">
                <h1>AvestAI</h1>
            </div>
            <div class="header-center">
                <p>Samantha Aire</p>
            </div>
            <div class="header-right">
                <button id="settingsBtn" class="settings-btn" title="Settings">⚙️</button>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-container">
            <div id="messages" class="messages-list">
                <div class="welcome-message">
                    <div class="welcome-content">
                        <h2>Welcome to AvestAI</h2>
                        <p>Your personal AI, running locally on your device.</p>
                        <div class="model-info">
                            <p>Samantha automatically picks the best model for each question.</p>
                            <p style="margin-top: 8px; font-size: 0.9em; opacity: 0.7;">To force a model, start your message with:<br>
                            <code>1</code> or <code>O</code> → Opus &nbsp;|&nbsp; <code>2</code> or <code>S</code> → Sonnet &nbsp;|&nbsp; <code>3</code> or <code>H</code> → Haiku</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="typing-indicator" style="display: none;">
                <div class="typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-footer">
            <div class="input-controls">
                <textarea 
                    id="messageInput" 
                    class="message-input" 
                    placeholder="Message… (Enter to send, Shift+Enter for newline)"
                    rows="1"
                ></textarea>
                <button id="voiceBtn" class="voice-btn" title="Speak instead of type">🎤</button>
                <button id="sendBtn" class="send-btn" title="Send (Enter)">📤</button>
            </div>

        </footer>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="closeSettings" class="close-btn">✕</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label for="themeSelect">Theme</label>
                        <select id="themeSelect" class="theme-select">
                            <option value="auto">Auto (system preference)</option>
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label for="colorSelect">Color Scheme</label>
                        <select id="colorSelect" class="color-select">
                            <option value="avestai">AvestAI (Gray/Blue/Black)</option>
                            <option value="ocean">Ocean (Blue)</option>
                            <option value="forest">Forest (Green)</option>
                            <option value="sunset">Sunset (Orange/Red)</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label for="fontSizeSelect">Font Size</label>
                        <select id="fontSizeSelect" class="font-size-select">
                            <option value="small">Small</option>
                            <option value="normal" selected>Normal</option>
                            <option value="large">Large</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <button id="exportBtn" class="button-secondary">Export Conversation</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Overlay (for modal background) -->
        <div id="modalOverlay" class="modal-overlay" style="display: none;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
